name: Update Cheatsheet Data

on:
  schedule:
    # Runs every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-for-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Check Claude Code docs for updates
        id: check
        run: |
          node scripts/check-updates.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update cheatsheet data from docs"
          title: "Update Claude Code Cheatsheet Data"
          body: |
            ## Automated Update

            This PR was automatically generated by the weekly update workflow.

            The Claude Code documentation has been checked for updates and the cheatsheet data has been refreshed.

            **Changes detected:**
            - Updated commands, shortcuts, or features from official docs

            Please review the changes before merging.
          branch: chore/update-cheatsheet-data
          delete-branch: true
          labels: automated,documentation
